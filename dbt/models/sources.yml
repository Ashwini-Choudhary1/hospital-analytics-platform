version: 2

sources:
  - name: bronze
    description: "Raw MIMIC-IV clinical hospital records loaded in the Bronze Medallion layer."
    schema: bronze
    tables:
      - name: departments
        description: "Hospital department definitions, bed capacities, and floor locations."
