hospital_analytics:
  target: dev_postgres
  outputs:
    # =================================================================
    # 100% Free Local PostgreSQL Data Warehouse Target (Default)
    # =================================================================
    dev_postgres:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', '127.0.0.1') }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5434') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'hospital_analytics') }}"
      schema: public
      threads: 4

    # =================================================================
    # Optional Cloud SaaS Target: Snowflake Data Warehouse
    # (To use Snowflake, run: dbt run --target dev_snowflake)
    # =================================================================
    dev_snowflake:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT', 'your_account') }}"
      user: "{{ env_var('SNOWFLAKE_USER', 'your_user') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD', 'your_password') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'SYSADMIN') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'HOSPITAL_ANALYTICS') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'COMPUTE_WH') }}"
      schema: public
      threads: 4
