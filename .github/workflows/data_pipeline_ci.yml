name: Hospital Analytics CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint_and_validate:
    name: 🔍 Lint & Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Linting Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Check Code Formatting with Black (Dry-Run)
        run: |
          black --check --diff scripts/ airflow/dags/ || echo "ℹ️ Formatting suggestions available (non-blocking)"

      - name: Lint Python Scripts with Flake8
        run: |
          # Check for syntax errors or undefined names (blocking errors)
          flake8 scripts/ airflow/dags/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat style and complexity issues as non-blocking warnings
          flake8 scripts/ airflow/dags/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

  dbt_integration_test:
    name: 🏥 End-to-End Pipeline & dbt Test
    runs-on: ubuntu-latest
    needs: lint_and_validate
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: hospital_analytics
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        command: server /data --console-address ":9001"
        ports:
          - 9000:9000
          - 9001:9001

    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5434
      POSTGRES_DB: hospital_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      MINIO_ENDPOINT: 127.0.0.1:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔬 Step 1 - Generate Synthetic Healthcare Data (MIMIC-IV Demo)
        run: |
          python scripts/generate_demo_data.py

      - name: 🌊 Step 2 - Ingest Bronze Layer (S3 Lake & PostgreSQL)
        run: |
          # Wait a few seconds to ensure MinIO service container is fully responsive
          sleep 5
          python scripts/load_bronze_layer.py

      - name: ⚙️ Step 3 - dbt Debug (Verify Warehouse Connection)
        run: |
          dbt debug --profiles-dir ./dbt --project-dir ./dbt --target dev_postgres

      - name: 🏗️ Step 4 - dbt Run (Transform Silver Staging & Gold Marts)
        run: |
          dbt run --profiles-dir ./dbt --project-dir ./dbt --target dev_postgres

      - name: 🛡️ Step 5 - dbt Test (Execute 100% Data Quality Assurance)
        run: |
          dbt test --profiles-dir ./dbt --project-dir ./dbt --target dev_postgres
